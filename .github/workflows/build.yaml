name: Angular CI Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Node js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install all dependencies
        run: npm ci

      - name: Build the angular application
        run: npm run build
